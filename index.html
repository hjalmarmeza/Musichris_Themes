<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0b">
    <title>MusiChris Themes | Universal Forge</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/logo_app.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #00f2ff;
            --accent-purple: #bc00ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: url('assets/master_template.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(10,10,11,0.4) 0%, rgba(10,10,11,0.8) 100%);
            z-index: -1;
        }

        /* Settings Button - REUBICADO A LA ZONA SEGURA (INFERIOR DERECHA) */
        #btn-settings {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--accent), var(--accent-purple));
            border: none;
            color: black;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 99999;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.5);
        }

        #btn-settings:hover {
            transform: rotate(90deg) scale(1.1);
            background: var(--accent);
        }

        /* Modal Settings */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 10002; /* Por encima del botón */
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .modal-content {
            width: 90%;
            max-width: 400px;
            background: #111;
            border: 1px solid var(--accent);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
        }

        .modal-content h3 {
            color: var(--accent);
            margin-top: 0;
            letter-spacing: 2px;
        }

        .modal-content p {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        .input-box {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
        }

        header {
            width: 100%;
            padding: 30px 0;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 22px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            border: 2px solid var(--glass-border);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        h1 {
            font-size: 28px;
            letter-spacing: 1px;
            margin: 10px 0 5px 0;
            background: linear-gradient(to bottom, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--text-dim);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .container {
            width: 92%;
            max-width: 450px;
            background: rgba(10, 10, 11, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        /* Mobile specific optimizations */
        @media (max-width: 600px) {
            h1 { font-size: 24px; }
            .container { padding: 20px; border-radius: 24px; }
            .forge-btn { padding: 16px; font-size: 14px; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        label {
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            font-weight: 600;
        }

        textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            color: white;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            min-height: 100px;
            resize: vertical;
        }

        textarea:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .forge-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, var(--accent), var(--accent-purple));
            border: none;
            border-radius: 16px;
            color: black;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .forge-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }

        .preview-area {
            margin-top: 25px;
            display: none;
            animation: slideUp 0.5s ease-out;
            text-align: center;
        }

        .phase-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 16px;
            text-align: left;
        }

        .phase-card h4 {
            margin: 0 0 8px 0;
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 2px;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .phase-card p {
            margin: 0;
            font-size: 15px;
            line-height: 1.6;
            color: rgba(255,255,255,1);
            font-weight: 300;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 20px;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #0a0a0b;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        #splash-screen.fade-out {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.1);
        }

        .splash-logo {
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
            animation: pulse 2s infinite ease-in-out;
            filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.4));
        }

        .enter-btn {
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .enter-btn:hover {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 30px var(--accent);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: var(--text-dim);
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="assets/logo_app.png" class="splash-logo" alt="Logo">
        <button class="enter-btn" onclick="enterApp()">ENTRAR A LA FORJA</button>
    </div>

    <button id="btn-settings" onclick="toggleSettings()" ontouchstart="toggleSettings()">⚙️</button>

    <div id="modal-settings" class="modal">
        <div class="modal-content">
            <h3>DIAMOND CONTROL</h3>
            <p>Configura tus llaves para producción remota.</p>
            <input type="password" id="gh-token" placeholder="GitHub PAT (ghp_...)" class="input-box">
            <input type="password" id="cerebras-key" placeholder="Cerebras API Key (csk_...)" class="input-box">
            <button class="forge-btn" onclick="saveSettings()">GUARDAR CONFIGURACIÓN</button>
            <button class="forge-btn" style="background: transparent; border: 1px solid #444; color: #888; margin-top: 10px;" onclick="toggleSettings()">CERRAR</button>
        </div>
    </div>

    <header>
        <div class="logo-area">
            <img src="assets/logo_app.png" alt="MusiChris Logo" class="logo-img">
            <h1>MusiChris Themes</h1>
        </div>
    </header>

    <div class="container">
        <div class="input-group">
            <label>Entrada de Fuente (Link, Noticia o Comentario)</label>
            <textarea id="sourceContent" placeholder="Pega aquí un Link de noticia, un comentario o un texto para procesar..." style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; color: white; font-family: inherit; font-size: 16px; outline: none; min-height: 100px; resize: vertical;"></textarea>
        </div>
        <button class="forge-btn" onclick="forgeContent()">Forjar Video</button>

        <div id="preview" class="preview-area">
            <div class="phase-card">
                <h4>FASE 1</h4>
                <p id="p1">...</p>
            </div>
            <div class="phase-card">
                <h4>FASE 2</h4>
                <p id="p2">...</p>
            </div>
            <div class="phase-card">
                <h4>FASE 3</h4>
                <p id="p3">...</p>
            </div>
            <div class="phase-card" style="border-color: var(--accent-purple);">
                <h4>CIERRE MINISTERIAL</h4>
                <p id="p4">...</p>
            </div>
            <button class="forge-btn" style="background: white; color: black; margin-top: 20px;" onclick="renderVideo()">Confirmar y Renderizar</button>
        </div>

        <div class="status-badge" id="status">
            <span id="status-icon">💎</span>
            <span id="status-text">Listo para crear</span>
        </div>
    </div>

    <footer>
        &copy; 2026 MUSICHRIS STUDIO | POWERED BY ANTIGRAVITY
    </footer>

    <script>
        let lastForgeData = null;

        // Cargar llaves al inicio
        window.onload = () => {
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('cerebras-key').value = localStorage.getItem('cerebras_key') || '';
        };

        function toggleSettings() {
            const modal = document.getElementById('modal-settings');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function saveSettings() {
            localStorage.setItem('gh_token', document.getElementById('gh-token').value);
            localStorage.setItem('cerebras_key', document.getElementById('cerebras-key').value);
            alert('✅ Configuración guardada con éxito.');
            toggleSettings();
        }

        async function forgeContent() {
            const content = document.getElementById('sourceContent').value;
            const cKey = localStorage.getItem('cerebras_key');
            
            const statusText = document.getElementById('status-text');
            const statusIcon = document.getElementById('status-icon');
            const preview = document.getElementById('preview');
            const p1 = document.getElementById('p1');
            const p2 = document.getElementById('p2');
            const p3 = document.getElementById('p3');
            const p4 = document.getElementById('p4');

            if(!content) return alert('Por favor, pega un contenido o link.');
            if(!cKey) return alert('Falta Cerebras API Key en Ajustes (⚙️).');
            
            statusText.innerText = 'Forjando guion ministerial...';
            statusIcon.innerText = '✨';
            preview.style.display = 'block';
            
            p1.innerText = 'Consultando oráculo de sabiduría...';
            p2.innerText = '...';
            p3.innerText = '...';
            p4.innerText = '...';

            try {
                // Llamada directa a Cerebras desde el navegador
                const response = await fetch('https://api.cerebras.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${cKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama3.1-70b",
                        messages: [
                            { role: "system", content: "Eres el motor de sabiduría ministerial 'MusiChris Themes'. Transforma noticias o links en 3 fases de reflexión cristiana profunda para YouTube Shorts. \n\nREGLAS CRÍTICAS:\n1. Títulos: Deben ser virales, cortos y SIEMPRE incluir '#Shorts' y emojis.\n2. Descripción: Incluye un resumen impactante y 5-8 hashtags relevantes.\n3. Formato JSON: {phase1, phase2, phase3, yt_title, yt_description}" },
                            { role: "user", content: `Noticia: ${content}` }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                if (!response.ok) throw new Error('Fallo en la conexión remota con Cerebras');

                const rawData = await response.json();
                const data = JSON.parse(rawData.choices[0].message.content);
                lastForgeData = data;
                
                p1.innerText = data.phase1;
                p2.innerText = data.phase2;
                p3.innerText = data.phase3;
                p4.innerText = "@Musichris_Studio\n¡Caminemos juntos en fe!";

                statusText.innerText = 'Forja completada con éxito';
                statusIcon.innerText = '✅';

            } catch (error) {
                console.error(error);
                statusText.innerText = 'Error: ' + error.message;
                statusIcon.innerText = '❌';
                p1.innerText = 'No se pudo forjar el contenido remótamente.';
            }
        }

        async function renderVideo() {
            const ghToken = localStorage.getItem('gh_token');
            const content = document.getElementById('sourceContent').value;
            const statusText = document.getElementById('status-text');

            if(!ghToken) return alert('Falta GitHub Token en Ajustes (⚙️).');
            if(!content) return alert('No hay contenido para renderizar.');

            statusText.innerText = 'Despachando orden a la nube (GitHub Actions)...';
            
            try {
                // Trigger GitHub Action vía API
                const response = await fetch('https://api.github.com/repos/hjalmarmeza/Musichris_Themes/actions/workflows/forge.yml/dispatches', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${ghToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: { theme: content }
                    })
                });

                if (!response.ok) throw new Error('Error al conectar con GitHub');

                statusText.innerText = '🚀 ¡Orden recibida! Revisa la pestaña Actions en GitHub.';
                alert('💎 Misión iniciada en la nube. GitHub Actions está fabricando tu video ahora mismo.');

            } catch (error) {
                console.error(error);
                statusText.innerText = 'Error al despachar orden.';
                alert('❌ No se pudo conectar con GitHub Actions. Revisa tu Token.');
            }
        }

        function enterApp() {
            const splash = document.getElementById('splash-screen');
            splash.classList.add('fade-out');
            
            // Eliminar del DOM tras la animación para evitar bloqueos táctiles
            setTimeout(() => {
                splash.style.display = 'none';
            }, 800);

            if (window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
        }

        // Registrar Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('🚀 Service Worker registrado!', reg))
                    .catch(err => console.log('❌ Error al registrar SW', err));
            });
        }
    </script>
</body>
</html>
