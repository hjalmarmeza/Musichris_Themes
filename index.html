<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusiChris Themes | Universal Forge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #00f2ff;
            --accent-purple: #bc00ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: url('assets/master_template.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(10,10,11,0.4) 0%, rgba(10,10,11,0.8) 100%);
            z-index: -1;
        }

        header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .logo-symbol {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent), var(--accent-purple));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: 600;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            position: relative;
        }

        .logo-symbol::after {
            content: '';
            position: absolute;
            inset: 5px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
        }

        h1 {
            font-size: 32px;
            letter-spacing: 2px;
            margin: 10px 0 5px 0;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--text-dim);
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        label {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            color: white;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            min-height: 100px;
            resize: vertical;
        }

        textarea:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .forge-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, var(--accent), var(--accent-purple));
            border: none;
            border-radius: 16px;
            color: black;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .forge-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }

        .preview-area {
            margin-top: 25px;
            display: none;
            animation: slideUp 0.5s ease-out;
            text-align: center;
        }

        .phase-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 16px;
            text-align: left;
        }

        .phase-card h4 {
            margin: 0 0 8px 0;
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .phase-card p {
            margin: 0;
            font-size: 15px;
            line-height: 1.5;
            color: rgba(255,255,255,0.9);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 20px;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: var(--text-dim);
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <div class="logo-symbol">M</div>
            <h1>MusiChris Themes</h1>
            <div class="tagline">Universal Forge v1.1</div>
        </div>
    </header>

    <div class="container">
        <div class="input-group">
            <label>Entrada de Fuente (Link, Noticia o Comentario)</label>
            <textarea id="sourceContent" placeholder="Pega aquí un Link de noticia, un comentario o un texto para procesar..." style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; color: white; font-family: inherit; font-size: 16px; outline: none; min-height: 100px; resize: vertical;"></textarea>
        </div>
        <button class="forge-btn" onclick="forgeContent()">Forjar Video</button>

        <div id="preview" class="preview-area">
            <div class="phase-card">
                <h4>FASE 1</h4>
                <p id="p1">...</p>
            </div>
            <div class="phase-card">
                <h4>FASE 2</h4>
                <p id="p2">...</p>
            </div>
            <div class="phase-card">
                <h4>FASE 3</h4>
                <p id="p3">...</p>
            </div>
            <div class="phase-card" style="border-color: var(--accent-purple);">
                <h4>CIERRE MINISTERIAL</h4>
                <p id="p4">...</p>
            </div>
            <button class="forge-btn" style="background: white; color: black; margin-top: 20px;" onclick="renderVideo()">Confirmar y Renderizar</button>
        </div>

        <div class="status-badge" id="status">
            <span id="status-icon">⚙️</span>
            <span id="status-text">Listo para crear</span>
        </div>
    </div>

    <footer>
        &copy; 2026 MUSICHRIS STUDIO | POWERED BY ANTIGRAVITY
    </footer>

    <script>
        let lastForgeData = null;
        let lastRenderPath = null;

        async function forgeContent() {
            const content = document.getElementById('sourceContent').value;
            const statusText = document.getElementById('status-text');
            const statusIcon = document.getElementById('status-icon');
            const preview = document.getElementById('preview');
            const p1 = document.getElementById('p1');
            const p2 = document.getElementById('p2');
            const p3 = document.getElementById('p3');
            const p4 = document.getElementById('p4');

            if(!content) return alert('Por favor, pega un contenido o link.');
            
            statusText.innerText = 'Forjando guion con el motor Cerebras (Llama 3.1)...';
            statusIcon.innerText = '✨';
            preview.style.display = 'block';
            
            p1.innerText = 'Procesando fuente...';
            p2.innerText = '...';
            p3.innerText = '...';
            p4.innerText = '...';

            try {
                const response = await fetch('/api/forge', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ content })
                });

                if (!response.ok) throw new Error('Error en la forja');

                const data = await response.json();
                lastForgeData = data;
                
                p1.innerText = data.phase1;
                p2.innerText = data.phase2;
                p3.innerText = data.phase3;
                p4.innerText = "@Musichris_Studio\nCaminemos juntos en fe";

                statusText.innerText = 'Forja completada con éxito';
                statusIcon.innerText = '✅';

            } catch (error) {
                console.error(error);
                statusText.innerText = 'Error en el motor de sabiduría';
                statusIcon.innerText = '❌';
                p1.innerText = 'No se pudo procesar el contenido.';
            }
        }

        async function renderVideo() {
            const statusText = document.getElementById('status-text');
            const p1 = document.getElementById('p1').innerText;
            const p2 = document.getElementById('p2').innerText;
            const p3 = document.getElementById('p3').innerText;

            if(!lastForgeData) return alert('Primero debes forjar el contenido.');

            statusText.innerText = 'Iniciando renderizado industrial...';
            
            try {
                const response = await fetch('/api/render', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        phases: lastForgeData
                    })
                });

                if (!response.ok) throw new Error('Error en el renderizado');

                const data = await response.json();
                lastRenderPath = data.fullPath;
                statusText.innerText = '¡Video renderizado con éxito!';
                
                // Añadir botón de publicar si no existe
                if (!document.getElementById('publish-btn')) {
                    const pubBtn = document.createElement('button');
                    pubBtn.id = 'publish-btn';
                    pubBtn.className = 'forge-btn';
                    pubBtn.style.background = 'var(--accent-purple)';
                    pubBtn.style.color = 'white';
                    pubBtn.style.marginTop = '10px';
                    pubBtn.innerText = '🚀 PUBLICAR EN YOUTUBE';
                    pubBtn.onclick = publishVideo;
                    document.getElementById('preview').appendChild(pubBtn);
                }

                alert('🚀 ' + data.message + '\nArchivo: ' + data.file);

            } catch (error) {
                console.error(error);
                statusText.innerText = 'Error en la producción de video';
                alert('❌ Hubo un fallo en el motor de video.');
            }
        }

        async function publishVideo() {
            const statusText = document.getElementById('status-text');
            if (!lastRenderPath || !lastForgeData) return alert('Faltan datos de renderizado.');

            statusText.innerText = 'Subiendo a YouTube...';
            
            try {
                const response = await fetch('/api/publish', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        filePath: lastRenderPath,
                        title: lastForgeData.yt_title,
                        description: lastForgeData.yt_description
                    })
                });

                if (!response.ok) throw new Error('Error en la publicación');

                const data = await response.json();
                statusText.innerText = '¡Publicado con éxito en YouTube!';
                alert('✅ ' + data.message + '\nURL: ' + data.url);
                window.open(data.url, '_blank');

            } catch (error) {
                console.error(error);
                statusText.innerText = 'Error en la publicación a YouTube';
                alert('❌ Hubo un fallo al subir el video.');
            }
        }
    </script>
</body>
</html>
